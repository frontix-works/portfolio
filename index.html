<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontix Portfolio</title>
    <link rel="shortcut icon" href="./imgs/frontix-symbol.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/frontix.css" />
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXX"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
 
        gtag('config', 'G-SFMT303P5B');
    </script>
</head>

<body>

<div data-include="./include/header.html"></div>

<section id="about" class="hero">
    <div class="container">
        <h2>Eunmi Yoon</h2>
        <p class="role">Senior Publisher</p>
        <!-- <p class="exp">20+ Years Experience</p> -->
        <div class="headline">
            금융권 / E-commerce 프로젝트 중심 · SCSS 구조화 · 유지보수 최적화
        </div>
        <div class="stack">HTML5 · SCSS · Javascript · React · Vue.js · WebSquare · Nexacro</div>
    </div>
</section>

<section id="career" class="career">
    <div class="container">
        <h3><span>Career Timeline</span></h3>
        <swiper-container id="timeline" class="mySwiper timeline" scrollbar-hide="true" auto-height="false" space-between="50" slides-per-view="auto">
        </swiper-container>
    </div>
</section>

<section id="projects" class="projects">
    <div class="container">
        <h3><span>Major Projects</span></h3>
        <div id="project" class="project-list grid"></div>
    </div>
</section>

<section class="companies">
    <div class="container">
        <h3><span>Enterprise Experience</span></h3>
        <swiper-container id="companies" class="mySwiper company-grid" pagination="false" pagination-clickable="true" navigation="false" space-between="30"
    centered-slides="false" autoplay-delay="2500" autoplay-disable-on-interaction="false" slides-per-view="4">
        </swiper-container>
    </div>
</section>

<section id="contact" class="contact">
    <div class="container">
        <h3><span>Contact</span></h3>
        <div class="contact-card">
            <p class="contact-desc">협업 및 프로젝트 문의는 아래 폼으로 보내주세요.</p>
            <form id="contact-form" class="contact-form">
                <div class="form-row">
                    <input type="text" name="name" placeholder="이름" required>
                    <input type="email" name="email" placeholder="이메일" required>
                </div>
                <textarea name="message" placeholder="문의 내용을 입력해주세요" required></textarea>
                <!-- honeypot -->
                <input type="text" name="company" class="hidden">
                <button type="submit" class="btn-send">메일 보내기</button>
            </form>
        </div>
    </div>
</section>

<div data-include="./include/footer.html"></div>

<button id="topBtn" class="top-btn">
    <svg width="20" height="20" viewBox="0 0 24 24">
        <path d="M12 5l-7 7h4v7h6v-7h4z" fill="#000"/>
    </svg>
</button>

<div id="modal" class="modal">
    <div class="modal-content">
        <button class="close">&times;</button>
        <div>
            <p id="modal-client"></p>
            <p id="modal-period"></p>
        </div>
        <h3 id="modal-project"></h3>
        <div class="modal-section">
            <strong>직무</strong>
            <p id="modal-role"></p>
        </div>
        <div class="modal-section">
            <strong>기여도</strong>
            <p id="modal-contribution"></p>
        </div>
        <div class="modal-section">
            <strong>기술</strong>
            <p id="modal-tech"></p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-element-bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script src="./js/include.js"></script>
<script src="./js/json.js"></script>
<script src="./js/portfolio.js"></script>
<script src="./js/privacy.js"></script>
<script src="./js/common.js"></script>

</body>
</html>
